pre-commit:
  jobs:
    - name: biome
      glob: "*.{js,ts,jsx,tsx,json}"
      run: pnpm biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true

    - name: tests
      run: pnpm test

pre-push:
  jobs:
    - name: typecheck
      run: pnpm tsc --noEmit

    - name: build
      run: pnpm build
